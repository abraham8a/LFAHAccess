<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Asamblea Regional 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

    :root {
      --bg-color: #0d1117;
      --card-bg: rgba(22, 27, 34, 0.7);
      --border-color: rgba(255, 255, 255, 0.1);
      --text-color: #c9d1d9;
      --text-muted: #8b949e;
      --primary: #2ea043;
      --primary-hover: #238636;
      --invalid-red: #da3633;
      --valid-green: #238636;
    }

    body {
      margin: 0;
      background: var(--bg-color);
      color: var(--text-color);
      font-family: 'Inter', sans-serif;
      text-align: center;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex: 1;
      justify-content: center;
      align-items: center;
    }

    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 2rem;
      width: 90%;
      max-width: 400px;
    }

    button {
      cursor: pointer;
      border-radius: 10px;
      border: none;
      font-family: inherit;
      font-weight: 600;
      transition: 0.2s;
    }

    .btn-primary {
      padding: 15px 30px;
      font-size: 1.2rem;
      background: var(--primary);
      color: white;
      width: 100%;
      margin-top: 10px;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    .btn-secondary {
      padding: 8px 16px;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    #mainUI {
      display: none;
      flex-direction: column;
      height: 100dvh;
      width: 100%;
      justify-content: space-between;
      padding: 2dvh 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      width: 90%;
      max-width: 500px;
      margin: 0 auto;
    }

    #reader-container {
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    #reader {
      width: 90%;
      height: 100%;
      max-width: 600px;
      border-radius: 20px;
      overflow: hidden;
    }

    #stats {
      font-size: 1rem;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
    }

    #count {
      font-size: 4rem;
      font-weight: 800;
      color: var(--primary);
    }

    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      font-size: 10vw;
      font-weight: 900;
      text-transform: uppercase;
    }

    .valid-bg { background: var(--valid-green); color: white; }
    .flash-red { background: var(--invalid-red); color: white; animation: blink 0.15s infinite; }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.3; }
      100% { opacity: 1; }
    }

    /* Landscape optimization */
    @media (orientation: landscape) {
      #mainUI {
        flex-direction: row;
        align-items: center;
        padding: 0 3%;
      }
      .header, #stats {
        width: 25%;
      }
      #reader-container {
        width: 50%;
        height: 100%;
      }
      #reader {
        height: 90%;
      }
    }
  </style>
</head>
<body>

  <!-- Setup Screen -->
  <div id="setup" class="panel">
    <div class="glass-card">
      <h1>Asamblea Regional 2026</h1>
      <p>Scanner System Ready</p>
      <button id="startBtn" class="btn-primary">Tap to Start Scanner</button>
    </div>
  </div>

  <!-- Main Scanner UI -->
  <div id="mainUI">
    <div class="header">
      <h2>Asamblea Regional 2026</h2>
      <button id="resetScanBtn" class="btn-secondary">Reset</button>
    </div>

    <div id="reader-container">
      <div id="reader"></div>
    </div>

    <div id="stats">
      Valid Admissions<br>
      <span id="count">0</span>
    </div>
  </div>

  <!-- Overlay -->
  <div id="overlay">
    <span id="overlayText">VALID</span>
  </div>

  <script>
    // CONFIG
    const config = {
      VALID_PARAMETER: "AsambleaRegional2026",
      RESET_PIN: "1234",
      STORAGE_KEY: "lfah_valid_scans_2026"
    };

    let validScans = 0;
    let isProcessing = false;
    let audioCtx;

    const setupDiv = document.getElementById("setup");
    const mainUI = document.getElementById("mainUI");
    const countDisplay = document.getElementById("count");
    const overlay = document.getElementById("overlay");
    const overlayText = document.getElementById("overlayText");

    // ---- PERSISTENT COUNTER ----
    function loadCounter() {
      const stored = localStorage.getItem(config.STORAGE_KEY);
      validScans = stored ? parseInt(stored, 10) : 0;
      countDisplay.textContent = validScans;
    }

    function saveCounter() {
      localStorage.setItem(config.STORAGE_KEY, validScans);
    }

    // ---- RESET WITH PIN ----
    document.getElementById("resetScanBtn").addEventListener("click", () => {
      const pin = prompt("Enter PIN to reset counter:");
      if (pin === config.RESET_PIN) {
        validScans = 0;
        saveCounter();
        countDisplay.textContent = validScans;
        alert("Counter reset.");
      } else if (pin !== null) {
        alert("Incorrect PIN.");
      }
    });

    // ---- SOUND ----
    function playSound(freq) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.value = freq;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
      osc.stop(audioCtx.currentTime + 0.4);
    }

    // ---- SCAN HANDLER ----
    function onScanSuccess(decodedText) {
      if (isProcessing) return;
      isProcessing = true;

      const isValid = decodedText.trim() === config.VALID_PARAMETER;

      overlay.style.display = "flex";

      if (isValid) {
        validScans++;
        saveCounter();
        countDisplay.textContent = validScans;

        overlay.className = "valid-bg";
        overlayText.textContent = "VALID";
        playSound(1200);
      } else {
        overlay.className = "flash-red";
        overlayText.textContent = "INVALID";
        playSound(200);
      }

      setTimeout(() => {
        overlay.style.display = "none";
        overlay.className = "";
        isProcessing = false;
      }, 2000);
    }

    // ---- START SCANNER ----
    function startScanner() {
      const html5QrCode = new Html5Qrcode("reader");

      const renderConfig = {
        fps: 15,
        qrbox: (vw, vh) => {
          const size = Math.floor(Math.min(vw, vh) * 0.8);
          return { width: size, height: size };
        }
      };

      html5QrCode
        .start({ facingMode: "environment" }, renderConfig, onScanSuccess)
        .catch(err => {
          alert("Camera Error: " + err);
          console.error(err);
        });
    }

    // ---- START BUTTON ----
    document.getElementById("startBtn").addEventListener("click", () => {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      setupDiv.style.display = "none";
      mainUI.style.display = "flex";
      loadCounter();
      startScanner();
    });

    loadCounter();
  </script>
</body>
</html>
