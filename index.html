<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>QR Gatekeeper V2</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg-color: #121212;
            --valid-color: #28a745;
            --invalid-color: #dc3545;
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Responsive Layout */
        #app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #reader {
            width: 100%;
            max-width: 450px;
            border: 2px solid #333 !important;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        #stats-container {
            margin-top: 30px;
            text-align: center;
        }

        .count-display {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
            color: #007bff;
        }

        .label {
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Controls */
        .controls {
            margin-top: 20px;
        }

        #reset-btn {
            background: transparent;
            color: #555;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        #reset-btn:hover {
            color: var(--invalid-color);
            border-color: var(--invalid-color);
        }

        /* Full Screen Overlays */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .overlay-text {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: -2px;
        }

        .valid-overlay {
            background-color: var(--valid-color);
        }

        .invalid-overlay {
            background-color: var(--invalid-color);
            animation: flash-red 0.3s infinite;
        }

        @keyframes flash-red {
            0% { background-color: var(--invalid-color); }
            50% { background-color: #800000; }
            100% { background-color: var(--invalid-color); }
        }

        /* Adjustments for the library's UI */
        #reader__dashboard_section_csr button {
            background: #007bff !important;
            color: white !important;
            border: none !important;
            padding: 10px 20px !important;
            border-radius: 5px !important;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="reader"></div>
        
        <div id="stats-container">
            <div class="count-display" id="scan-count">0</div>
            <div class="label">Total Scans</div>
            
            <div class="controls">
                <button id="reset-btn">RESET COUNTER</button>
            </div>
        </div>
    </div>

    <div id="valid-screen" class="overlay valid-overlay">
        <div class="overlay-text">VALID</div>
    </div>

    <div id="invalid-screen" class="overlay invalid-overlay">
        <div class="overlay-text">INVALID</div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const CONFIG = {
            pin: "1234", // PIN to reset counter
            validPhrases: ["AUTHORIZED", "OCHOA-2026", "Regional2026"], // Custom text strings
            dateRange: {
                start: new Date('2026-04-01T00:00:00'),
                end: new Date('2026-04-04T23:59:59')
            },
            feedbackDelay: 2500 // How long (ms) the result stays on screen
        };

        // ==========================================
        // STATE MANAGEMENT
        // ==========================================
        let scanCount = parseInt(localStorage.getItem('qr_tally_v2')) || 0;
        document.getElementById('scan-count').innerText = scanCount;

        function updateCount() {
            scanCount++;
            localStorage.setItem('qr_tally_v2', scanCount);
            document.getElementById('scan-count').innerText = scanCount;
        }

        // ==========================================
        // SCANNER LOGIC
        // ==========================================
        const html5QrCode = new Html5Qrcode("reader");

        const onScanSuccess = (decodedText, decodedResult) => {
            html5QrCode.pause(); // Stop scanning while showing result
            processScan(decodedText);
        };

        function processScan(text) {
            let isValid = false;

            // 1. Check Date Validity
            const scannedDate = new Date(text);
            if (!isNaN(scannedDate.getTime())) {
                if (scannedDate >= CONFIG.dateRange.start && scannedDate <= CONFIG.dateRange.end) {
                    isValid = true;
                }
            }

            // 2. Check Text Phrase Validity (if not already valid by date)
            if (!isValid && CONFIG.validPhrases.includes(text)) {
                isValid = true;
            }

            // 3. UI Response
            if (isValid) {
                showOverlay('valid-screen');
                updateCount();
            } else {
                showOverlay('invalid-screen');
            }

            // 4. Resume Scanning
            setTimeout(() => {
                hideOverlays();
                html5QrCode.resume();
            }, CONFIG.feedbackDelay);
        }

        function showOverlay(id) {
            document.getElementById(id).style.display = 'flex';
        }

        function hideOverlays() {
            document.getElementById('valid-screen').style.display = 'none';
            document.getElementById('invalid-screen').style.display = 'none';
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        const qrConfig = { 
            fps: 15, 
            qrbox: function(viewWidth, viewHeight) {
                let minEdge = Math.min(viewWidth, viewHeight);
                let boxSize = Math.floor(minEdge * 0.6);
                return { width: boxSize, height: boxSize };
            }
        };

        html5QrCode.start({ facingMode: "environment" }, qrConfig, onScanSuccess);

        // ==========================================
        // RESET FUNCTIONALITY
        // ==========================================
        document.getElementById('reset-btn').addEventListener('click', () => {
            const entry = prompt("Enter PIN to reset tally:");
            if (entry === CONFIG.pin) {
                if (confirm("Clear all scan data?")) {
                    scanCount = 0;
                    localStorage.setItem('qr_tally_v2', 0);
                    document.getElementById('scan-count').innerText = 0;
                }
            } else if (entry !== null) {
                alert("Incorrect PIN.");
            }
        });
    </script>
</body>
</html>
