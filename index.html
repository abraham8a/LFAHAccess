<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>QR Gatekeeper V2</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg-color: #121212;
            --valid-color: #28a745;
            --invalid-color: #dc3545;
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 15px 0;
            font-size: 1.5rem;
            font-weight: bold;
            background: #1e1e1e;
            border-bottom: 1px solid #333;
        }

        #app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            padding: 10px;
            box-sizing: border-box;
        }

        #reader {
            width: 100%;
            max-width: 400px;
            border: 2px solid #444 !important;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        #stats-container {
            text-align: center;
            width: 100%;
        }

        .count-display {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1;
            color: var(--valid-color); /* Changed to Green */
        }

        .label {
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-top: 5px;
        }

        .controls {
            margin-top: 15px;
        }

        #reset-btn {
            background: transparent;
            color: #444;
            border: 1px solid #333;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        /* Full Screen Overlays */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .overlay-text {
            font-size: 6rem;
            font-weight: 900;
        }

        .valid-overlay { background-color: var(--valid-color); }
        .invalid-overlay {
            background-color: var(--invalid-color);
            animation: flash-red 0.3s infinite;
        }

        @keyframes flash-red {
            0%, 100% { background-color: var(--invalid-color); }
            50% { background-color: #800000; }
        }

        /* Button styling for library UI */
        #reader__dashboard_section_csr button {
            background: #444 !important;
            color: white !important;
            border: none !important;
            padding: 8px 15px !important;
            border-radius: 4px !important;
        }
    </style>
</head>
<body>

    <header>Asamblea Regional 2026</header>

    <div id="app-container">
        <div id="reader"></div>
        
        <div id="stats-container">
            <div class="count-display" id="scan-count">0</div>
            <div class="label">Total Scans</div>
            
            <div class="controls">
                <button id="reset-btn">RESET</button>
            </div>
        </div>
    </div>

    <div id="valid-screen" class="overlay valid-overlay">
        <div class="overlay-text">VALID</div>
    </div>

    <div id="invalid-screen" class="overlay invalid-overlay">
        <div class="overlay-text">INVALID</div>
    </div>

    <script>
        const CONFIG = {
            pin: "1234",
            validPhrases: ["AUTHORIZED", "OCHOA-2026"],
            dateRange: {
                start: new Date('2026-04-01T00:00:00'),
                end: new Date('2026-04-04T23:59:59')
            },
            feedbackDelay: 2500
        };

        let scanCount = parseInt(localStorage.getItem('qr_tally_v2')) || 0;
        document.getElementById('scan-count').innerText = scanCount;

        function updateCount() {
            scanCount++;
            localStorage.setItem('qr_tally_v2', scanCount);
            document.getElementById('scan-count').innerText = scanCount;
        }

        const html5QrCode = new Html5Qrcode("reader");

        const onScanSuccess = (decodedText) => {
            html5QrCode.pause();
            processScan(decodedText);
        };

        function processScan(text) {
            let isValid = false;
            const scannedDate = new Date(text);
            
            if (!isNaN(scannedDate.getTime())) {
                if (scannedDate >= CONFIG.dateRange.start && scannedDate <= CONFIG.dateRange.end) {
                    isValid = true;
                }
            }

            if (!isValid && CONFIG.validPhrases.includes(text)) {
                isValid = true;
            }

            if (isValid) {
                showOverlay('valid-screen');
                updateCount();
            } else {
                showOverlay('invalid-screen');
            }

            setTimeout(() => {
                hideOverlays();
                html5QrCode.resume();
            }, CONFIG.feedbackDelay);
        }

        function showOverlay(id) { document.getElementById(id).style.display = 'flex'; }
        function hideOverlays() {
            document.getElementById('valid-screen').style.display = 'none';
            document.getElementById('invalid-screen').style.display = 'none';
        }

        const qrConfig = { 
            fps: 15, 
            qrbox: (vw, vh) => {
                let size = Math.min(vw, vh) * 0.7;
                return { width: size, height: size };
            }
        };

        html5QrCode.start({ facingMode: "environment" }, qrConfig, onScanSuccess);

        document.getElementById('reset-btn').addEventListener('click', () => {
            const entry = prompt("Enter PIN:");
            if (entry === CONFIG.pin) {
                if (confirm("Reset counter?")) {
                    scanCount = 0;
                    localStorage.setItem('qr_tally_v2', 0);
                    document.getElementById('scan-count').innerText = 0;
                }
            }
        });
    </script>
</body>
</html>
